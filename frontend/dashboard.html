<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Nexora AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <!-- Background Glows -->
    <div class="glow-circle shape-1"></div>
    <div class="glow-circle shape-2"></div>

    <!-- MOBILE ONLY HEADER (Hidden on Desktop) -->
    <div class="mobile-header glass">
        <button id="hamburgerBtn" class="hamburger-btn"><i class="fa-solid fa-bars"></i></button>
        <a href="index.html" class="logo mobile-logo">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span>Nexora<span class="highlight">AI</span></span>
        </a>
        <button class="btn btn-outline btn-small logout-action" title="Logout">
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>
    </div>

    <!-- Sidebar Overlay for Mobile -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="dashboard-container">
        
        <!-- SIDEBAR (Fixed on Desktop, Slide-in on Mobile) -->
        <aside id="sidebar" class="sidebar glass">
            <div class="sidebar-header">
                <a href="index.html" class="logo" style="text-decoration: none;">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>Nexora<span class="highlight">AI</span></span>
                </a>
                <button id="closeSidebarBtn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <p class="menu-label">AI TOOLS</p>
            <ul id="toolList">
                <li class="active" data-tool="Blog Generator"><i class="fa-solid fa-pen-nib"></i> Blog Generator</li>
                <li data-tool="Google Ads Copy"><i class="fa-brands fa-google"></i> Google Ads Copy</li>
                <li data-tool="SEO Keywords"><i class="fa-solid fa-magnifying-glass-chart"></i> SEO Keywords</li>
                <li data-tool="Instagram Captions"><i class="fa-brands fa-instagram"></i> Instagram Captions</li>
                <li data-tool="YouTube Script"><i class="fa-brands fa-youtube"></i> YouTube Script</li>
                <li data-tool="Cold Email"><i class="fa-solid fa-envelope"></i> Cold Email</li>
            </ul>

            <div class="sidebar-footer">
                <button id="historyBtn" class="btn btn-secondary" style="width: 100%; justify-content: center;">
                    <i class="fa-solid fa-clock-rotate-left"></i> Chat History
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="dashboard-header glass">
                <h2 id="currentToolTitle">Blog Generator</h2>
                <div class="user-profile">
                    <span id="userNameDisplay">Welcome, User</span>
                    <button class="btn btn-secondary btn-small logout-action">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </div>
            </header>

            <!-- Workspace Area -->
            <div class="workspace chat-workspace">
                <!-- Chat Feed -->
                <div class="chat-container glass" id="chatContainer">
                    <div class="empty-state" id="emptyState">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <p id="emptyStateText">Welcome to Blog Generator. What would you like to create?</p>
                    </div>
                </div>

                <!-- Bottom Input & Export Box -->
                <div style="display: flex; justify-content: flex-end; margin-bottom: 10px; padding-right: 5px;">
                    <button id="exportBtn" class="btn btn-secondary btn-small" title="Download Document">
                        <i class="fa-solid fa-file-arrow-down"></i> Download Text
                    </button>
                </div>
                
                <div class="chat-input-box glass">
                    <textarea id="aiPrompt" rows="1" placeholder="Type your prompt here..."></textarea>
                    <button id="generateBtn" class="btn btn-primary send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal-overlay hidden">
        <div class="modal-content glass history-modal">
            <button id="closeHistoryModal" class="close-btn" style="display: block;"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-header">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> Your History</h2>
                <p>Access your past AI generations</p>
            </div>
            <div class="history-list" id="historyList">
                <!-- History Items will be loaded here by JS -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
